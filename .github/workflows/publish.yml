name: publish

# (Neu-Registrierung erzwungen)
# Cloud-Zeitplan: prueft alle 30 Min die Datei-Queue (queue.json) und postet faellige Reels.
# PC muss NICHT laufen. Manuell testbar ueber "Run workflow".
on:
  schedule:
    # Alle ~20 Min in aktiven Stunden (06-21 UTC = 08-23 lokal), versetzte Minuten (:04/:24/:44).
    # NICHT :00/:30 nehmen (GitHub-Hoechstlast -> Laeufe werden verworfen). So landet ein geplanter
    # Post innerhalb von ~20 Min. GitHub-Cron bleibt "best effort" (kann etwas spaeter feuern).
    # Budget: ~1440 Laeufe/Monat (GitHub zaehlt jeden Lauf min. 1 Min) -> im 2000-Min-Freitier.
    - cron: "4,24,44 6-21 * * *"
  workflow_dispatch: {}

# Nur EIN Lauf gleichzeitig — verhindert, dass ueberlappende Cron-/Dispatch-Laeufe
# denselben faelligen Eintrag doppelt posten (Ursache der Mehrfach-Posts 16.06.).
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python poster.py
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          UPLOADPOST_API_KEY: ${{ secrets.UPLOADPOST_API_KEY }}
          UPLOADPOST_PROFILE: ${{ secrets.UPLOADPOST_PROFILE }}
      - name: Queue-Status zurueckschreiben (queue.json committen)
        if: always()
        run: |
          git config user.name "queue-bot"
          git config user.email "queue-bot@users.noreply.github.com"
          git add queue.json
          if git diff --cached --quiet; then echo "keine Queue-Aenderung"; exit 0; fi
          git commit -m "queue: Status-Update (Cloud-Lauf)"
          for i in 1 2 3; do git push && exit 0; git pull --rebase; done
          exit 1
